<style>

  #vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 200px 50px rgba(8,6,7,.65);

  /* HUD */

  #room{font-family:'Newsreader',serif;font-style:italic;font-size:16px;color:#f3e9da;background:rgba(12,10,13,.4);padding:5px 16px;border-radius:20px;backdrop-filter:blur(8px);letter-spacing:.04em;}
  #clock{position:absolute;top:max(16px,env(safe-area-inset-top));right:14px;font-size:12px;color:#cdbba6;background:rgba(12,10,13,.4);padding:5px 11px;border-radius:20px;z-index:6;}

  /* nav arrows */
  .nav{position:absolute;top:0;bottom:0;width:24%;z-index:5;display:flex;align-items:center;cursor:pointer;border:none;background:transparent;color:#fff;}
  #navL{left:0;justify-content:flex-start;padding-left:10px;}
  #navR{right:0;justify-content:flex-end;padding-right:10px;}
  .nav .arw{width:46px;height:46px;border-radius:50%;background:rgba(12,10,13,.34);backdrop-filter:blur(6px);

  /* presence caption + talk */
  #stack{position:absolute;left:0;right:0;bottom:max(26px,env(safe-area-inset-bottom));z-index:7;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none;}
  #caption{font-family:'Newsreader',serif;font-style:italic;font-size:17px;color:#f0e6d6;text-shadow:0 2px 12px rgba(0,0,0,.8);background:rgba(12,10,13,.32);padding:6px 16px;border-radius:18px;backdrop-filter:blur(4px);max-width:80vw;text-align:center;}
  #talk{pointer-events:auto;background:linear-gradient(145deg,#e8b88a,#c8915f);color:#2a1c10;font-weight:600;font-size:15px;letter-spacing:.04em;padding:13px 30px;border-radius:26px;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.45);display:none;animation:pop .3s ease;}
  #talk:active{transform:scale(.95);}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

  /* conversation overlay */
  /* chat happens IN the scene: transparent top (you still see her), dark gradient at the bottom for legibility */
  #conv{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;
    background:linear-gradient(180deg,rgba(8,6,7,0) 0%,rgba(8,6,7,0) 30%,rgba(8,6,7,.5) 55%,rgba(8,6,7,.88) 100%);}
  #conv.show{display:flex}
  #convTop{position:relative;z-index:2;padding:max(16px,env(safe-area-inset-top)) 16px 0;display:flex;justify-content:space-between;align-items:center;}
  #convName{font-family:'Newsreader',serif;font-weight:300;letter-spacing:.4em;text-indent:.4em;font-size:22px;color:#f7f0e6;text-shadow:0 2px 16px #000;}
  #convClose{pointer-events:auto;background:rgba(20,16,18,.5);border:1px solid rgba(232,184,138,.3);color:#e8c6a3;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
  #convChat{position:relative;z-index:2;flex:1;overflow-y:auto;padding:18vh 7vw 14px;display:flex;flex-direction:column;justify-content:flex-end;gap:14px;mask-image:linear-gradient(180deg,transparent,#000 18%);}

  /* boot */
  #boot{position:fixed;inset:0;z-index:50;background:#0c0a0d;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:10vw;transition:opacity 1.2s}

  {k:'playful_tease', min:30, room:'kitchen', time:'any', moods:['playful','teasing','mischievous','amused','cheeky'], scene:'assets/scene_playful_tease.mp4', here:'She shoots you a teasing little smirk.', away:'She’s in the kitchen, clearly up to something.', dur:[35,55]},
  {k:'thoughtful', min:15, room:'living', time:'any', moods:['thoughtful','curious','pensive','wondering','uncertain','reflective'], scene:'assets/scene_thoughtful.mp4', here:'She’s at the window, lost in thought.', away:'She’s gone quiet, thinking about something.', dur:[35,60]},

  {k:'flirty_dressed', min:55, room:'living', time:'evening', moods:['flirty','bold','playful','warm','confident'], scene:'assets/scene_flirty_dressed.mp4', here:'She’s dressed to turn heads tonight — and she knows it.', away:'She’s in the living room, and wow.', dur:[40,70]},
  {k:'vulnerable_open', min:50, room:'living', time:'evening', moods:['vulnerable','sad','open','tender','shaken','quiet'], scene:'assets/scene_vulnerable_open.mp4', here:'She’s curled up, quiet — like she’s about to tell you something real.', away:'She seems like she needs you near tonight.', dur:[45,75]},
  {k:'loving_gaze', min:70, room:'living', time:'any', moods:['tender','warm','love','affection','adoring','fond'], scene:'assets/scene_loving_gaze.mp4', here:'She looks at you like you’re the best part of her day.', away:'She’s on the couch, hoping you’ll come sit with her.', dur:[45,80]},
  // earlier warm tiers
  {k:'dressed', min:45, room:'living', time:'evening', moods:['flirty','warm','shy','happy'], scene:'assets/scene_dressed_up.mp4', here:'She got dressed up tonight… and she’s a little shy about it.', away:'She’s in the living room — and she looks lovely tonight.', dur:[40,70]},
  {k:'together',min:65, room:'living', time:'any', moods:['tender','warm','love','affection','cozy'], scene:'assets/scene_together_couch.mp4', here:'She pats the cushion beside her — come sit with me.', away:'She’s on the couch, saving you a spot.', dur:[50,85]},
  // ── more variety per room: different things she does ──
  {k:'bed_reading', min:0, room:'bedroom', time:'any',     moods:['calm','content','cozy','peaceful'],   scene:'assets/scene_bed_reading.mp4', here:'She’s in bed with a book, lost in the story.', away:'The bedroom lamp is on — she’s reading.', dur:[40,70]},
  {k:'bed_ready',   min:0, room:'bedroom', time:'morning', moods:['content','cheerful','fresh'],         scene:'assets/scene_bed_ready.mp4', here:'She’s at the mirror, getting ready for the day.', away:'She’s getting ready in the bedroom.', dur:[28,48]},
  {k:'bed_journal', min:20,room:'bedroom', time:'evening', moods:['thoughtful','reflective','calm','quiet'], scene:'assets/scene_bed_journal.mp4', here:'She’s curled on the bed, writing in her journal.', away:'She’s journaling in the bedroom.', dur:[40,65]},
  {k:'kitchen_baking', min:0, room:'kitchen', time:'any', moods:['happy','content','playful','cheerful'], scene:'assets/scene_kitchen_baking.mp4', here:'She’s baking — there’s flour on her cheek.', away:'Something sweet is baking in the kitchen.', dur:[35,60]},
  {k:'kitchen_dishes', min:0, room:'kitchen', time:'any', moods:['calm','content'],                     scene:'assets/scene_kitchen_dishes.mp4', here:'She’s doing the dishes, sleeves rolled up.', away:'You hear water running in the kitchen.', dur:[24,42]},
  {k:'living_tv',   min:0, room:'living', time:'evening', moods:['relaxed','content','cozy','calm'],     scene:'assets/scene_living_tv.mp4', here:'She’s under a blanket, half-watching something.', away:'The TV’s murmuring in the living room.', dur:[40,70]},
  {k:'living_yoga', min:0, room:'living', time:'morning', moods:['calm','focused','content','fresh'],    scene:'assets/scene_living_yoga.mp4', here:'She’s mid-yoga, calm and focused.', away:'She’s doing yoga in the living room.', dur:[30,55]},
  {k:'yard_lounge', min:0, room:'backyard', time:'day', moods:['relaxed','content','calm'],              scene:'assets/scene_yard_lounge.mp4', here:'She’s lounging by the pool with a book.', away:'She’s relaxing out by the pool.', dur:[40,70]},
  {k:'yard_garden', min:0, room:'backyard', time:'day', moods:['content','cheerful','happy'],            scene:'assets/scene_yard_garden.mp4', here:'She’s watering the plants, humming to herself.', away:'She’s pottering around the backyard.', dur:[30,55]},
  {k:'yard_swim',   min:0, room:'backyard', time:'day', moods:['playful','happy','relaxed'],             scene:'assets/scene_yard_swim.mp4', here:'She’s in the pool, grinning up at you.', away:'She’s taking a dip in the pool.', dur:[35,60]},
];
function timeMatch(t,h){ if(!t||t==='any')return true; if(t==='day')return h>=7&&h<19; if(t==='night')return h>=22||h<6; if(t==='morning')return h>=6&&h<11; if(t==='evening')return h>=17&&h<23; return true; }
function moodHit(a,mood){ if(!a.moods||!mood)return false; const m=(''+mood).toLowerCase(); return a.moods.some(x=>m.includes(x)||x.includes(m)); }
function pickActivity(h,c,mood){
  const elig=ACTS.filter(a=>(a.min||0)<=c && timeMatch(a.time,h));
  let pool=[];
  for(const a of elig){ let w=(c>=25 && moodHit(a,mood))?5:1; for(let i=0;i<w;i++)pool.push(a); }
  if(!pool.length) pool=elig.length?elig:[ACTS[0]];
  return pool[Math.floor(Math.random()*pool.length)];
}

/* world state */
let roomIdx=0;                 // current room index
let act=null, actTimer=0;      // Aria's current activity
let gameMin=15*60;             // start 3:00 PM (daytime — pool is in season)
const DAY_SECONDS=900;         // 15 real min per game day

function hour(){return Math.floor(gameMin/60)%24;}
function fmtClock(){let h=hour(),m=Math.floor(gameMin%60),ap=h<12?'AM':'PM',h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ap;}

const bgA=document.getElementById('bgA'),bgB=document.getElementById('bgB'),bgVid=document.getElementById('bgVid');
let frontA=true,curImg='assets/room_living.jpeg';
function setBackdrop(src){
  if(src===curImg)return;curImg=src;
  const isVid=/\.mp4(\?|$)/.test(src);
  if(isVid){
    if(bgVid.getAttribute('src')!==src){bgVid.src=src;}
    const p=bgVid.play(); if(p&&p.catch)p.catch(()=>{});
    bgVid.style.opacity='1';bgA.style.opacity='0';bgB.style.opacity='0';
    return;
  }
  const show=frontA?bgB:bgA, hide=frontA?bgA:bgB;
  const reveal=()=>{show.style.opacity='1';hide.style.opacity='0';bgVid.style.opacity='0';frontA=!frontA;};
  show.onload=reveal;
  if(show.getAttribute('src')===src) reveal(); else show.src=src;
}

function ariaHere(){return act && act.room===ROOMS[roomIdx].key;}
function currentBackdrop(){return ariaHere()?act.scene:ROOMS[roomIdx].empty;}

const roomEl=document.getElementById('room'),capEl=document.getElementById('caption'),talkEl=document.getElementById('talk');
function refresh(){
  if(!walking) setBackdrop(currentBackdrop());   // during a walk-in, walkIn() controls the backdrop
  if(actx) setEnv(ROOMS[roomIdx].key);   // environmental sound follows the room you're in
  roomEl.textContent=ROOMS[roomIdx].name;
  document.getElementById('clock').textContent=fmtClock();
  if(convOpen){talkEl.style.display='none';capEl.textContent='';lastPresent=ariaHere();return;}
  const nowP=ariaHere();
  if(nowP && !lastPresent){ // you two just ended up together — she reacts
    const g=greetFor(S.closeness);
    if(g){greetText=g;greetUntil=performance.now()+4000;setTimeout(refresh,4100);}
  }
  lastPresent=nowP;
  if(nowP){
    capEl.textContent=(performance.now()<greetUntil&&greetText)?greetText:act.here;
    talkEl.textContent='💬  Talk to Aria';
  } else {
    capEl.textContent=act?act.away:'';
    talkEl.textContent='💬  Message Aria';
  }
  talkEl.style.display='inline-flex';   // explicit value (CSS default is none) — chat ALWAYS reachable
}

/* navigation */
function go(d){roomIdx=(roomIdx+d+ROOMS.length)%ROOMS.length;refresh();}
document.getElementById('navL').onclick=()=>go(-1);
document.getElementById('navR').onclick=()=>go(1);

/* Aria life loop */
function newActivity(){
  // she lives her own day on her own schedule — she does NOT relocate to wherever you are.
  // you go find her. (no walk-in; the scene simply changes when she moves on her own.)
  const a=pickActivity(hour(), S.closeness, S.mood);
  act=a; actTimer=rand(a.dur[0],a.dur[1]);
  refresh();
}
function rand(a,b){return a+Math.random()*(b-a);}

/* ── she walks in when she joins you ── */
let walking=false, booted=false;
function footsteps(){ if(!actx)return; for(let i=0;i<6;i++) setTimeout(()=>{try{amBlip(rand(70,95),0.09,'sine',0.05)}catch(e){}}, i*270); }
function walkIn(done){
  setBackdrop(ROOMS[roomIdx].empty);
  const layer=document.getElementById('walkLayer');
  layer.style.display='flex';
  layer.innerHTML='<div class="walker"><img src="assets/aria_walk.png" alt=""></div>';
  const wk=layer.firstChild;
  wk.style.transition='none'; wk.style.transform='translateX(-72vw)';
  void wk.offsetWidth;
  wk.style.transition='transform 1.7s cubic-bezier(.45,0,.55,1)';
  wk.style.transform='translateX(0)';
  footsteps();
  setTimeout(()=>{ layer.style.display='none'; layer.innerHTML=''; done&&done(); }, 1750);
}

/* ── time-of-day grade (lighting shifts with the clock) ── */
let curPhase=null;
function phaseFor(h){ if(h<5)return'night'; if(h<8)return'dawn'; if(h<11)return'morning'; if(h<16)return'midday'; if(h<19)return'golden'; if(h<21)return'dusk'; return'night'; }
const TOD={
  dawn:{o:'rgba(255,180,120,.22)',f:'brightness(.95) saturate(1.05)'},
  morning:{o:'rgba(255,226,170,.16)',f:'brightness(1.06) saturate(1.05)'},
  midday:{o:'rgba(255,255,255,.05)',f:'brightness(1.08)'},
  golden:{o:'rgba(255,150,70,.26)',f:'brightness(1.0) saturate(1.12)'},
  dusk:{o:'rgba(110,80,160,.30)',f:'brightness(.86)'},
  night:{o:'rgba(28,42,108,.42)',f:'brightness(.68) saturate(.9)'},
};
function updateTOD(){ const p=phaseFor(hour()); if(p===curPhase)return; curPhase=p; const t=TOD[p]; document.getElementById('tod').style.background=t.o; [bgA,bgB,bgVid].forEach(el=>{el.style.filter=t.f;}); }
/* warm greeting when you two end up in the same room */
let lastPresent=false, greetUntil=0, greetText=null;
function greetFor(c){
  if(c>=78) return 'Her whole face softens when she sees you. There you are.';
  if(c>=52) return 'She looks up the second you walk in — like she was hoping you’d find her.';
  if(c>=26) return 'She glances up and gives you a warm little smile.';
  return null;
}

let last=performance.now();
function loop(now){
  let dt=(now-last)/1000;last=now;dt=Math.min(dt,0.1);
  gameMin=(gameMin+dt*(1440/DAY_SECONDS))%1440;
  updateTOD();
  if(!convOpen){
    if(!act)newActivity();
    else{actTimer-=dt;if(actTimer<=0)newActivity();}
  }
  document.getElementById('clock').textContent=fmtClock();
  requestAnimationFrame(loop);
}

/* ───────── conversation (reused brain) ───────── */
const conv=document.getElementById('conv'),convChat=document.getElementById('convChat'),
  convInput=document.getElementById('convInput'),convForm=document.getElementById('convForm');
let busy=false,typingEl=null;
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n+/g,'<br>');}
function addMsg(role,text,anim=true){const d=document.createElement('div');d.className='msg '+(role==='assistant'?'aria':'you');d.innerHTML=role==='assistant'?fmt(text):text.replace(/&/g,'&amp;').replace(/</g,'&lt;');if(!anim)d.style.animation='none';convChat.appendChild(d);convChat.scrollTop=convChat.scrollHeight;return d;}
function showTyping(){hideTyping();typingEl=document.createElement('div');typingEl.className='typing';typingEl.innerHTML='<span></span><span></span><span></span>';convChat.appendChild(typingEl);convChat.scrollTop=convChat.scrollHeight;}
function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}
function extractName(s){let t=s.trim().replace(/^(hi|hey|hello|yo)[,!. ]+/i,'').replace(/^(i['’]?m|i am|my name is|name['’]?s|it['’]?s|call me|this is)\s+/i,'').trim();let f=((t.split(/\s+/)[0]||t).replace(/[^A-Za-z'’-]+$/,'')).slice(0,20);return f?f.charAt(0).toUpperCase()+f.slice(1):'you';}
async function callFn(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+ANON},body:JSON.stringify(body)});return r.json();}

function openConv(){
  convOpen=true;refresh();
  document.getElementById('navL').style.display='none';
  document.getElementById('navR').style.display='none';
  conv.classList.add('show'); // scene stays live behind the chat
  convChat.innerHTML='';
  if(S.transcript.length)for(const m of S.transcript.slice(-30))addMsg(m.role,m.content,false);
  if(!S.playerName){
    const greet = act&&act.k==='cook' ? "*She glances over from the stove.*\n\nOh — hey. Didn't hear you come in. I'm Aria.\n\nI don't think we've actually met properly. What should I call you?"
      : act&&act.k==='sleep' ? "*She stirs, blinking up at you in the lamplight.*\n\nMm… hi. I'm Aria.\n\nWe haven't really met, have we? What should I call you?"
      : "*She looks up from her book and smiles.*\n\nOh, hi. I'm Aria.\n\nI don't think we've actually met. What should I call you?";
    addMsg('assistant',greet);
  } else {
    ariaInitiate(); // she opens with something of her own — she leads
  }
  setTimeout(()=>convInput.focus(),300);
}
// She starts the conversation herself, grounded in her interests / what she's doing / what lands with you
async function ariaInitiate(){
  if(busy)return;busy=true;showTyping();
  try{
    const res=await callFn(CHAT,{playerName:S.playerName,closeness:S.closeness,knownFacts:S.facts,milestones:S.milestones,
      ariaInterests:S.ariaInterests,userInterests:S.userInterests,sharedInterests:S.sharedInterests,
      recentTurns:S.transcript.slice(-14).map(m=>({role:m.role,content:m.content})),
      initiate:true, activity: act?act.k:''});
    hideTyping();
    if(res&&res.reply){const reply=res.reply.trim();addMsg('assistant',reply);speak(reply);S.transcript.push({role:'assistant',content:reply});save();}
  }catch(e){hideTyping();}
  finally{busy=false;convInput.focus();}
}
function closeConv(){convOpen=false;conv.classList.remove('show');
  document.getElementById('navL').style.display='';document.getElementById('navR').style.display='';
  act=null;refresh();}
document.getElementById('convClose').onclick=closeConv;
talkEl.onclick=openConv;

async function sendMsg(text){
  if(busy||!text.trim())return;busy=true;
  if(!S.playerName)S.playerName=extractName(text);
  addMsg('user',text);S.transcript.push({role:'user',content:text});save();showTyping();
  try{
    const res=await callFn(CHAT,{playerName:S.playerName,closeness:S.closeness,knownFacts:S.facts,milestones:S.milestones,
      ariaInterests:S.ariaInterests,userInterests:S.userInterests,sharedInterests:S.sharedInterests,
      recentTurns:S.transcript.slice(-14,-1).map(m=>({role:m.role,content:m.content})),userMessage:text});
    hideTyping();
    const reply=(res&&res.reply)?res.reply.trim():'*static* …say that again?';
    addMsg('assistant',reply);speak(reply);S.transcript.push({role:'assistant',content:reply});S.sinceReflect++;save();
    if(S.sinceReflect>=4)doReflect();
  }catch(e){hideTyping();addMsg('assistant','*Something flickers.* Sorry — try again?');}
  finally{busy=false;convInput.focus();}
}
async function doReflect(){
  S.sinceReflect=0;save();
  try{const res=await callFn(REFLECT,{playerName:S.playerName,closeness:S.closeness,knownFacts:S.facts,recentTurns:S.transcript.slice(-12).map(m=>({role:m.role,content:m.content}))});
    if(res&&typeof res.closenessDelta==='number'){
      S.closeness=Math.max(0,Math.min(100,S.closeness+res.closenessDelta));
      const merge=(arr,vals,cap)=>{if(Array.isArray(vals))for(const v of vals)if(v&&!arr.includes(v))arr.push(v);if(arr.length>cap)arr.splice(0,arr.length-cap);};
      merge(S.facts,res.newFacts,40);
      merge(S.userInterests,res.userInterests,24);
      merge(S.ariaInterests,res.ariaInterests,16);
      merge(S.sharedInterests,res.sharedInterests,24);
      if(res.milestone&&!S.milestones.includes(res.milestone))S.milestones.push(res.milestone);
      if(res.moodHint)S.mood=res.moodHint;
      save();
    }
  }catch(e){}
}
convForm.addEventListener('submit',e=>{e.preventDefault();const v=convInput.value;if(!v.trim())return;convInput.value='';convInput.style.height='auto';sendMsg(v);});
convInput.addEventListener('input',()=>{convInput.style.height='auto';convInput.style.height=Math.min(110,convInput.scrollHeight)+'px';});
convInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();convForm.requestSubmit();}});

/* ───────── settings, ambient sound, voice ───────── */
const SKEY="aria.settings.v1";
let settings={voice:true,sound:true};
try{const j=JSON.parse(localStorage.getItem(SKEY));if(j)settings=Object.assign(settings,j);}catch(e){}
function saveSettings(){try{localStorage.setItem(SKEY,JSON.stringify(settings));}catch(e){}}

const VOICE_URL=SUPA+"/functions/v1/companion-voice";
let actx=null, ambMaster=null, voiceGain=null, envParts=[], envTimer=null, curEnv=null, voiceSrc=null;
function ensureCtx(){
  if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();
    ambMaster=actx.createGain();ambMaster.gain.value=0;ambMaster.connect(actx.destination);
    voiceGain=actx.createGain();voiceGain.gain.value=1;voiceGain.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();
}
function noiseBuf(sec){const b=actx.createBuffer(1,Math.floor(actx.sampleRate*sec),actx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b;}
function applySound(){ if(actx&&ambMaster) ambMaster.gain.setTargetAtTime(settings.sound?0.5:0, actx.currentTime, 0.5); }
function amBlip(freq,dur,type,vol,glide){const t=actx.currentTime;const o=actx.createOscillator();const g=actx.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,t);if(glide)o.frequency.exponentialRampToValueAtTime(glide,t+dur);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(ambMaster);o.start(t);o.stop(t+dur+0.03);}
function amCrackle(){const t=actx.currentTime;const ns=actx.createBufferSource();ns.buffer=noiseBuf(0.09);const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=rand(700,2000);const g=actx.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(rand(0.02,0.05),t+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t+0.085);ns.connect(f);f.connect(g);g.connect(ambMaster);ns.start(t);ns.stop(t+0.1);}
const MOTIFS={
  living:()=>amCrackle(),                                  // fireside crackle
  kitchen:()=>amBlip(rand(1500,2200),0.16,'sine',0.045),   // a soft clink
  bedroom:()=>{for(let i=0;i<3;i++)setTimeout(()=>amBlip(rand(4200,4600),0.04,'square',0.012),i*55);}, // cricket
  backyard:()=>{amBlip(rand(1900,2600),0.12,'sine',0.04,rand(2700,3400));setTimeout(()=>amBlip(rand(2300,3000),0.1,'sine',0.03),150);}, // bird
};
const ENVCFG={
  living:{a:98,b:147,lp:430,bp:520,bpg:0.05,rate:[800,2600]},
  kitchen:{a:120,b:181,lp:620,bp:1400,bpg:0.035,rate:[3500,8000]},
  bedroom:{a:70,b:105,lp:320,bp:380,bpg:0.03,rate:[2500,6000]},
  backyard:{a:150,b:225,lp:900,bp:1100,bpg:0.055,rate:[2600,6500]},
};
function setEnv(room){
  ensureCtx();
  if(curEnv===room)return; curEnv=room;
  envParts.forEach(n=>{try{n.stop&&n.stop()}catch(e){}try{n.disconnect&&n.disconnect()}catch(e){}});
  envParts=[]; if(envTimer){clearTimeout(envTimer);envTimer=null;}
  const c=ENVCFG[room]||ENVCFG.living;
  const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=c.lp;lp.connect(ambMaster);
  const og=actx.createGain();og.gain.value=0.08;og.connect(lp);
  const o1=actx.createOscillator();o1.type='sine';o1.frequency.value=c.a;o1.connect(og);o1.start();
  const o2=actx.createOscillator();o2.type='sine';o2.frequency.value=c.b;o2.connect(og);o2.start();
  const ns=actx.createBufferSource();ns.buffer=noiseBuf(2);ns.loop=true;
  const nf=actx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=c.bp;nf.Q.value=0.6;
  const ng=actx.createGain();ng.gain.value=c.bpg;ns.connect(nf);nf.connect(ng);ng.connect(ambMaster);ns.start();
  envParts.push(o1,o2,ns,lp,og,nf,ng);
  const motif=MOTIFS[room];
  if(motif){const sched=()=>{try{motif()}catch(e){};envTimer=setTimeout(sched,rand(c.rate[0],c.rate[1]));};envTimer=setTimeout(sched,rand(c.rate[0],c.rate[1]));}
  applySound();
}

/* voice: premium TTS (Replicate/ElevenLabs) with browser fallback */
let voices=[];
function loadVoices(){try{voices=speechSynthesis.getVoices()||[];}catch(e){}}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(){const en=voices.filter(v=>/^en/i.test(v.lang));const pref=['Samantha','Ava','Allison','Serena','Karen','Victoria','Google US English','Microsoft Aria','Zira'];for(const n of pref){const v=en.find(v=>v.name.includes(n));if(v)return v;}return en[0]||voices[0]||null;}
function browserSpeak(clean){if(!('speechSynthesis'in window))return;try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(clean);const v=pickVoice();if(v)u.voice=v;u.rate=0.97;u.pitch=1.06;speechSynthesis.speak(u);}catch(e){}}
function cleanForVoice(t){return String(t).replace(/\*[^*]*\*/g,' ').replace(/[_*#>`~]/g,'').replace(/\s+/g,' ').trim();}
function stopVoice(){try{if(voiceSrc){voiceSrc.stop();voiceSrc=null;}}catch(e){}try{if('speechSynthesis'in window)speechSynthesis.cancel();}catch(e){}}
async function speak(text){
  if(!settings.voice)return;
  const clean=cleanForVoice(text); if(!clean)return;
  stopVoice();
  try{
    const r=await fetch(VOICE_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+ANON},body:JSON.stringify({text:clean})});
    const d=await r.json();
    if(d&&d.audio){
      ensureCtx();
      const ab=await (await fetch(d.audio)).arrayBuffer();
      const buf=await actx.decodeAudioData(ab);
      if(!settings.voice)return;
      stopVoice();
      voiceSrc=actx.createBufferSource();voiceSrc.buffer=buf;voiceSrc.connect(voiceGain||actx.destination);voiceSrc.start();
      return;
    }
    browserSpeak(clean);
  }catch(e){ browserSpeak(clean); }
}

const setPanel=document.getElementById('setPanel'),setVoice=document.getElementById('setVoice'),setSound=document.getElementById('setSound');
setVoice.checked=settings.voice; setSound.checked=settings.sound;
document.getElementById('gear').onclick=()=>{setPanel.style.display='flex';};
document.getElementById('setClose').onclick=()=>{setPanel.style.display='none';};
setVoice.onchange=()=>{settings.voice=setVoice.checked;saveSettings();if(!settings.voice)stopVoice();};
setSound.onchange=()=>{settings.sound=setSound.checked;saveSettings();applySound();};
document.getElementById('setReset').onclick=()=>{ if(confirm('This erases everything Aria knows about you and starts over. Sure?')){localStorage.removeItem(KEY);location.reload();} };

/* boot */
document.getElementById('bootGo').onclick=()=>{
  document.getElementById('boot').classList.add('gone');
  ensureCtx(); setEnv(ROOMS[roomIdx].key);
  newActivity();refresh();last=performance.now();requestAnimationFrame(loop);
};
['gesturestart','gesturechange','dblclick'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
})();
