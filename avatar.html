<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aria — living avatar prototype</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#0c0a0d;color:#f4ece1;font-family:Inter,system-ui,sans-serif;}
  #stage{position:fixed;inset:0;}
  #status{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-size:12px;color:#cdbba6;background:rgba(12,10,13,.5);padding:5px 14px;border-radius:16px;z-index:5;}
  #bar{position:fixed;left:0;right:0;bottom:0;padding:10px 12px max(14px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px;z-index:5;background:linear-gradient(180deg,transparent,rgba(12,10,13,.85) 40%);}
  #moods{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  #moods button{padding:8px 14px;border-radius:14px;border:1px solid rgba(232,184,138,.35);background:rgba(28,24,21,.85);color:#e8c6a3;font-size:13px;cursor:pointer;}
  #moods button.on{background:linear-gradient(145deg,#e8b88a,#c8915f);color:#2a1c10;border-color:transparent;}
  #say{display:flex;gap:8px;max-width:620px;width:100%;margin:0 auto;}
  #sayInput{flex:1;background:rgba(28,24,21,.9);border:1px solid rgba(232,184,138,.25);color:#f4ece1;font-size:16px;padding:11px 14px;border-radius:18px;outline:none;}
  #sayBtn{flex:none;padding:0 18px;border-radius:18px;border:none;background:linear-gradient(145deg,#e8b88a,#c8915f);color:#2a1c10;font-weight:600;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<div id="stage"></div>
<div id="status">loading her…</div>
<div id="avaturnBox" hidden style="position:fixed;inset:0;z-index:50;background:#0c0a0d">
  <button id="avaturnClose" style="position:absolute;top:max(10px,env(safe-area-inset-top));right:12px;z-index:51;width:36px;height:36px;border-radius:50%;border:1px solid rgba(232,184,138,.4);background:rgba(20,16,18,.85);color:#e8c6a3;font-size:16px;cursor:pointer">✕</button>
  <div id="avaturnFrame" style="position:absolute;inset:0"></div>
</div>
<div id="bar">
  <div id="moods">
    <button data-m="warm" class="on">Warm</button>
    <button data-m="flirty">Flirty</button>
    <button data-m="soft">Soft</button>
    <button data-m="sad">Sad</button>
    <button data-m="surprised">Surprised</button>
    <button data-m="wave">👋 Wave</button>
    <button data-m="create">✨ New look</button>
  </div>
  <form id="say"><input id="sayInput" placeholder="type something for her to say out loud…"><button id="sayBtn" type="submit">Say it</button></form>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/jsm/",
    "@pixiv/three-vrm": "./vendor/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
import { AvaturnSDK } from './vendor/avaturn-sdk.js';

const SUPA="https://mymunodjaxymhbnhjwjx.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15bXVub2RqYXh5bWhibmhqd2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODY3ODIsImV4cCI6MjA5NDU2Mjc4Mn0.9LWApiBIhfw118d_NG6ossc_OWUZzt69kyij7NiVY38";
const VOICE_URL=SUPA+"/functions/v1/companion-voice";

// model resolution: ?glb=<url> (persisted) > ?m=<vendored vrm> > default vrm list
const qs=new URLSearchParams(location.search);
function normalizeGlbUrl(u){
  if(/models\.readyplayer\.me\/[^?]+\.glb/.test(u) && !/morphTargets/.test(u)) return u+(u.includes('?')?'&':'?')+'morphTargets=ARKit,Oculus%20Visemes';
  return u;
}
let GLB_URL=qs.get('glb')||'';
if(GLB_URL){ try{localStorage.setItem('aria.avatar.glb',GLB_URL);}catch(e){} }
else { try{ if(!qs.get('m')) GLB_URL=localStorage.getItem('aria.avatar.glb')||''; }catch(e){} }
if(qs.get('reset')==='1'){ GLB_URL=''; try{localStorage.removeItem('aria.avatar.glb');}catch(e){} }
const pick=qs.get('m');
const ARM_OVERRIDE=parseFloat(qs.get('arms')||'');
const MODEL_URLS=GLB_URL?[normalizeGlbUrl(GLB_URL)]:(pick?["./vendor/models/"+pick+".vrm"]:[
  "./vendor/models/twist.vrm",
  "./vendor/models/alicia.vrm",
  "./vendor/models/seed.vrm"
]);

const statusEl=document.getElementById('status');
const setStatus=(t)=>{statusEl.textContent=t;};

// ── renderer / scene ──
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.getElementById('stage').appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x14100e);
scene.fog=new THREE.Fog(0x14100e,3,9);
// image-based lighting so realistic PBR avatars (Ready Player Me) don't render flat
try{
  const pmrem=new THREE.PMREMGenerator(renderer);
  scene.environment=pmrem.fromScene(new RoomEnvironment(renderer),0.04).texture;
}catch(e){}
const camera=new THREE.PerspectiveCamera(28,innerWidth/innerHeight,0.1,50);
camera.position.set(0,1.32,1.55);
const key=new THREE.DirectionalLight(0xffd9b0,1.4); key.position.set(0.8,1.8,1.4); scene.add(key);
const fill=new THREE.DirectionalLight(0x8fa8ff,0.4); fill.position.set(-1.2,1.2,0.6); scene.add(fill);
scene.add(new THREE.AmbientLight(0x604a3a,0.7));
const floor=new THREE.Mesh(new THREE.CircleGeometry(3,48),new THREE.MeshBasicMaterial({color:0x0f0c0a}));
floor.rotation.x=-Math.PI/2; scene.add(floor);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// ── the rig: one abstraction over VRM (anime) and GLB/ARKit (realistic, e.g. Ready Player Me) ──
let rig=null;
const lookAtTarget=new THREE.Object3D(); camera.add(lookAtTarget); scene.add(camera);

const GLB_BONES={ head:'Head', neck:'Neck', chest:'Spine2', spine:'Spine',
  leftUpperArm:'LeftArm', rightUpperArm:'RightArm', leftLowerArm:'LeftForeArm', rightLowerArm:'RightForeArm',
  leftHand:'LeftHand', rightHand:'RightHand', leftEye:'LeftEye', rightEye:'RightEye' };
const GLB_EXPR={
  blink:[['eyeBlinkLeft',1],['eyeBlinkRight',1]],
  aa:[['jawOpen',0.8],['mouthOpen',0.6]],
  happy:[['mouthSmileLeft',0.9],['mouthSmileRight',0.9],['cheekSquintLeft',0.3],['cheekSquintRight',0.3]],
  relaxed:[['mouthSmileLeft',0.45],['mouthSmileRight',0.45]],
  sad:[['mouthFrownLeft',0.8],['mouthFrownRight',0.8],['browInnerUp',0.7]],
  surprised:[['browInnerUp',0.8],['browOuterUpLeft',0.8],['browOuterUpRight',0.8],['eyeWideLeft',0.7],['eyeWideRight',0.7],['jawOpen',0.25]],
  angry:[['browDownLeft',0.8],['browDownRight',0.8]],
};

function bone(n){
  if(!rig)return null;
  if(rig.kind==='vrm'){ try{ return rig.vrm.humanoid.getNormalizedBoneNode(n); }catch(e){ return null; } }
  const name=GLB_BONES[n]||n; return rig.bonesByName[name]||rig.bonesByName['mixamorig'+name]||rig.bonesByName['mixamorig:'+name]||null;
}
function setExpr(name,val){
  if(!rig)return;
  if(rig.kind==='vrm'){ try{ rig.vrm.expressionManager.setValue(name,val); }catch(e){} return; }
  const targets=GLB_EXPR[name]; if(!targets)return;
  for(const [morph,w] of targets){
    const hits=rig.morphs[morph]; if(!hits)continue;
    for(const h of hits) h.mesh.morphTargetInfluences[h.idx]=val*w;
  }
}
function poseSign(){
  if(!rig)return -1;
  if(rig.kind==='vrm'){ try{ return (rig.vrm.meta && String(rig.vrm.meta.metaVersion)==='0') ? 1 : -1; }catch(e){ return -1; } }
  return 1; // GLB (mixamo-style) T-pose: left arm +X, +Z rotation brings it down
}
let armSign=0; // resolved once per model: whichever direction puts her hands DOWN
function applyArms(sgn,a){
  const l=bone('leftUpperArm'), r=bone('rightUpperArm');
  const ll=bone('leftLowerArm'), rl=bone('rightLowerArm');
  if(l)l.rotation.z=sgn*a; if(r)r.rotation.z=-sgn*a;
  if(ll)ll.rotation.z=sgn*0.15; if(rl)rl.rotation.z=-sgn*0.15;
}
function worldY(b){ if(!b)return 0; b.updateWorldMatrix(true,false); const v=new THREE.Vector3(); b.getWorldPosition(v); return v.y; }
function relaxPose(){
  const a=isNaN(ARM_OVERRIDE)?1.15:Math.abs(ARM_OVERRIDE);
  if(!armSign){
    // try the guess, then verify: if her hand ended up above her shoulder, flip it
    let sgn=(!isNaN(ARM_OVERRIDE)&&ARM_OVERRIDE<0)?-poseSign():poseSign();
    applyArms(sgn,a);
    try{
      rig.root.updateMatrixWorld(true);
      const hand=bone('leftHand'), sh=bone('leftUpperArm');
      if(hand&&sh&&worldY(hand)>worldY(sh)-0.05){ sgn=-sgn; }
    }catch(e){}
    armSign=sgn;
  }
  applyArms(armSign,a);
}

function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open('aria-avatar',1); r.onupgradeneeded=()=>r.result.createObjectStore('kv'); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbPut(k,v){ const d=await idb(); return new Promise((res,rej)=>{ const t=d.transaction('kv','readwrite'); t.objectStore('kv').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function idbGet(k){ const d=await idb(); return new Promise((res,rej)=>{ const t=d.transaction('kv','readonly'); const g=t.objectStore('kv').get(k); g.onsuccess=()=>res(g.result); g.onerror=()=>rej(g.error); }); }
async function idbDel(k){ const d=await idb(); return new Promise((res,rej)=>{ const t=d.transaction('kv','readwrite'); t.objectStore('kv').delete(k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }

let sdkStarted=false;
function openCreator(){
  document.getElementById('avaturnBox').hidden=false;
  if(sdkStarted)return; sdkStarted=true;
  const sdk=new AvaturnSDK();
  sdk.init(document.getElementById('avaturnFrame'),{url:'https://demo.avaturn.dev'}).then(()=>{
    sdk.on('export', async (data)=>{
      document.getElementById('avaturnBox').hidden=true;
      setStatus('bringing her in…');
      try{
        const resp=await fetch(data.url); const blob=await resp.blob();
        try{ await idbPut('avatar', blob); }catch(e){}
        await loadModel([URL.createObjectURL(blob)]);
        applyMood();
      }catch(e){ setStatus('couldn’t load her new look'); }
    });
  }).catch(()=>{ setStatus('avatar creator failed to load'); });
}
document.getElementById('avaturnClose').onclick=()=>{ document.getElementById('avaturnBox').hidden=true; };

function clearRig(){ if(rig){ try{scene.remove(rig.root);}catch(e){} rig=null; armSign=0; } }
async function loadModel(urls){
  clearRig();
  const loader=new GLTFLoader();
  loader.register((p)=>new VRMLoaderPlugin(p));
  for(const url of (urls||MODEL_URLS)){
    try{
      setStatus('loading her…');
      const gltf=await loader.loadAsync(url);
      const v=gltf.userData.vrm;
      if(v){
        VRMUtils.removeUnnecessaryVertices(gltf.scene);
        VRMUtils.combineSkeletons(gltf.scene);
        if(VRMUtils.rotateVRM0)VRMUtils.rotateVRM0(v);
        scene.add(v.scene);
        rig={kind:'vrm',vrm:v,root:v.scene};
        try{ v.lookAt.target=lookAtTarget; }catch(e){}
      } else {
        const root=gltf.scene;
        const bonesByName={}, morphs={};
        root.traverse((o)=>{
          if(o.isBone||o.type==='Bone')bonesByName[o.name]=o;
          if(o.morphTargetDictionary){
            for(const [k,idx] of Object.entries(o.morphTargetDictionary)){
              (morphs[k]=morphs[k]||[]).push({mesh:o,idx});
            }
          }
          if(o.isMesh){o.frustumCulled=false;}
        });
        scene.add(root);
        rig={kind:'glb',root,bonesByName,morphs};
        console.log('glb morphs:',Object.keys(morphs).length,'bones:',Object.keys(bonesByName).length);
      }
      relaxPose();
      try{
        const head=bone('head');
        const p=new THREE.Vector3(); head.updateWorldMatrix(true,false); head.getWorldPosition(p);
        camera.position.set(0,p.y-0.02,1.15);
        camera.lookAt(0,p.y-0.06,0);
      }catch(e){}
      window.__vrmReady=true;
      setStatus(rig.kind==='glb'?'she\u2019s here (realistic rig) \u2014 she follows your finger':'she\u2019s here \u2014 move your finger, she follows');
      return true;
    }catch(e){ console.log('model failed',url,e&&e.message); }
  }
  window.__vrmError=true;
  setStatus('couldn\u2019t load the avatar model');
  return false;
}

// ── moods ──
let mood='warm';
const MOODS={
  warm:{happy:0.35,relaxed:0.25},
  flirty:{happy:0.5,relaxed:0.6},
  soft:{relaxed:0.5},
  sad:{sad:0.7},
  surprised:{surprised:0.85},
};
function applyMood(){
  if(!rig)return;
  ['happy','relaxed','sad','surprised','angry'].forEach(k=>setExpr(k,0));
  const m=MOODS[mood]||{};
  Object.entries(m).forEach(([k,v])=>setExpr(k,v));
}
document.getElementById('moods').addEventListener('click',(e)=>{
  const b=e.target.closest('button'); if(!b)return;
  const m=b.dataset.m;
  if(m==='wave'){ wave(); return; }
  if(m==='create'){ openCreator(); return; }
  mood=m; applyMood();
  document.querySelectorAll('#moods button').forEach(x=>x.classList.toggle('on',x===b));
});

let waveT=0;
function wave(){ waveT=2.2; }

// ── gaze follows pointer/touch ──
let px=0, py=0;
function onPoint(x,y){ px=(x/innerWidth)*2-1; py=(y/innerHeight)*2-1; }
addEventListener('pointermove',(e)=>onPoint(e.clientX,e.clientY),{passive:true});
addEventListener('touchmove',(e)=>{const t=e.touches[0]; if(t)onPoint(t.clientX,t.clientY);},{passive:true});

// ── voice + live lip sync ──
let actx=null, analyser=null, talking=false;
function ensureCtx(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); } if(actx.state==='suspended')actx.resume(); }
async function sayIt(text){
  if(!text.trim()||!rig)return;
  ensureCtx();
  setStatus('\u2026');
  try{
    const r=await fetch(VOICE_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+ANON},body:JSON.stringify({text, rpVoice:'English_Soft-spokenGirl', speed:0.95})});
    const d=await r.json();
    if(!d||!d.audio){ setStatus('voice unavailable'); return; }
    const ab=await (await fetch(d.audio)).arrayBuffer();
    const buf=await actx.decodeAudioData(ab);
    const src=actx.createBufferSource(); src.buffer=buf;
    analyser=actx.createAnalyser(); analyser.fftSize=512;
    src.connect(analyser); analyser.connect(actx.destination);
    talking=true; setStatus('she\u2019s talking to you');
    src.onended=()=>{ talking=false; analyser=null; setExpr('aa',0); setStatus('she\u2019s listening'); };
    src.start();
  }catch(e){ setStatus('voice failed'); }
}
document.getElementById('say').addEventListener('submit',(e)=>{
  e.preventDefault();
  const i=document.getElementById('sayInput');
  sayIt(i.value); i.value='';
});

// ── the life loop ──
const clock=new THREE.Clock();
let blinkTimer=1.5+Math.random()*3, blinkPhase=0;
const lipData=new Uint8Array(256);
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  if(rig){
    const chest=bone('chest')||bone('spine');
    if(chest)chest.rotation.x=Math.sin(t*1.5)*0.018;
    const head=bone('head');
    if(head){
      head.rotation.z=Math.sin(t*0.4)*0.03;
      head.rotation.x=Math.sin(t*0.9)*0.012 + py*0.12;
      head.rotation.y=px*0.22;
    }
    const spine=bone('spine');
    if(spine)spine.rotation.z=Math.sin(t*0.25)*0.02;
    // eyes: VRM has a lookAt system; realistic rigs get direct eye-bone gaze
    lookAtTarget.position.set(px*0.35,-py*0.28,0);
    if(rig.kind==='glb'){
      const le=bone('leftEye'), re=bone('rightEye');
      if(le){ le.rotation.y=px*0.25; le.rotation.x=py*0.12; }
      if(re){ re.rotation.y=px*0.25; re.rotation.x=py*0.12; }
    }
    blinkTimer-=dt;
    if(blinkTimer<=0){ blinkPhase=0.18; blinkTimer=2+Math.random()*3.5; }
    if(blinkPhase>0){
      blinkPhase-=dt;
      const v=Math.sin(Math.PI*Math.max(0,blinkPhase)/0.18);
      setExpr('blink',v);
    } else setExpr('blink',0);
    if(talking&&analyser){
      analyser.getByteTimeDomainData(lipData);
      let sum=0; for(let i=0;i<lipData.length;i++){const d=(lipData[i]-128)/128; sum+=d*d;}
      const rms=Math.sqrt(sum/lipData.length);
      const open=Math.min(1,Math.max(0,(rms-0.02)*9));
      setExpr('aa',open);
    }
    if(waveT>0){
      waveT-=dt;
      const r=bone('rightUpperArm'), rl=bone('rightLowerArm');
      if(r)r.rotation.z=-(armSign||poseSign())*2.4;
      if(rl)rl.rotation.z=Math.sin(t*10)*0.5-0.3;
      if(waveT<=0)relaxPose();
    }
    if(rig.kind==='vrm')rig.vrm.update(dt);
  }
  renderer.render(scene,camera);
}
(async ()=>{
  let urls=MODEL_URLS;
  if(qs.get('reset')==='1'){ try{await idbDel('avatar');}catch(e){} }
  else if(!qs.get('glb') && !pick){
    try{ const b=await idbGet('avatar'); if(b) urls=[URL.createObjectURL(b)]; }catch(e){}
  }
  await loadModel(urls);
  applyMood();
})();
animate();
</script>
</body>
</html>
